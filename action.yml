name: 'AI PR Guardian'
description: 'Detect low-quality AI-generated PRs and score them for quality improvements'
author: 'ollieb89'

inputs:
  fail-on-low-score:
    description: 'Fail the check if quality score is below threshold (0-100)'
    required: false
    default: '40'
  
  github-token:
    description: 'GitHub token for posting comments and check runs'
    required: true

runs:
  using: 'node20'
  main: 'dist/bundle/index.js'

branding:
  icon: 'shield'
  color: 'orange'
